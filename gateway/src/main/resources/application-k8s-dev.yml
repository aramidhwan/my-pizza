server:
  port: 80

spring:
  application:
    name: gateway

  cloud:
    gateway:
      httpclient:
        ssl:
          useInsecureTrustManager: true

      routes:
        - id: common
          uri: http://dev-common.dev-app.svc.cluster.local:8080
          # Service 개체가 ClusterIP 일때는 동일 네임스페이스 내에서는 단순히 http://dev-store:8080 만으로도 호출 가능
          # uri: http://dev-store:8080 ← 단, gateway가 같은 dev-app 네임스페이스에 있을 때만 가능
          predicates:
            - Path=/common-service/**
          #            - Path=/**   # --> 요거는 '/'를 포함하지 않음
          #            - Path=/
          filters:
            - RewritePath=/common-service/(?<segment>.*), /$\{segment}
        - id: store
          uri: http://dev-store.dev-app.svc.cluster.local:8080
          predicates:
            - Path=/store-service/**
          filters:
            - RewritePath=/store-service/(?<segment>.*), /$\{segment}
        - id: order
          uri: http://dev-order.dev-app.svc.cluster.local:8080
          predicates:
            - Path=/order-service/**
          filters:
            - RewritePath=/order-service/(?<segment>.*), /$\{segment}
        - id: delivery
          uri: http://dev-delivery.dev-app.svc.cluster.local:8080
          predicates:
            - Path=/delivery-service/**
          filters:
            - RewritePath=/delivery-service/(?<segment>.*), /$\{segment}
        - id: mypage
          uri: http://dev-mypage.dev-app.svc.cluster.local:8080
          predicates:
            - Path=/mypage-service/**
          filters:
            - RewritePath=/mypage-service/(?<segment>.*), /$\{segment}
        - id: ignore-favicon
          uri: http://localhost  # 아무거나, 실제 요청 안 함
          predicates:
            - Path=/favicon.ico
          filters:
            - SetStatus=204
        - id: root
          uri: http://dev-common.dev-app.svc.cluster.local:8080
          predicates:
            #            - Path=/**   # --> 요거는 '/'를 포함하지 않음
            - Path=/

