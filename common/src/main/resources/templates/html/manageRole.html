<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="/common-service/js/manageRole.js"></script>
    <style>
        .cssAlignCenter {
            text-align: center;
        }
        .no-line {
            text-decoration: none;
        }
        .hidden_info {
            diplay:none;
        }
    </style>
</head>
<body>
<div class="container-sm">
    <div class="row">
        <div class="col">
            <h4 style="white-space:nowrap;">회원 Role 부여</h4>
        </div>
    </div>

    <div class="row">
        <div class="col">
            <hr>
        </div>
    </div>

    <div class="row">
        <div class="col">
            <table class="table table-striped" id="tblCustomer">
                <thead>
                <tr class="table-warning">
                    <th class="cssAlignCenter" style="width: 40px">No</th>
                    <th class="cssAlignCenter" style="width: 200px">Customer ID</th>
                    <th class="cssAlignCenter" style="width: 200px">Customer Name</th>
                    <th class="cssAlignCenter" style="width: 200px">Email</th>
                    <th class="cssAlignCenter" style="width: 200px">Activated</th>
                </tr>
                </thead>
                <tbody>
                <th:block th:each="customerDto : ${customerDtos}">
                    <tr>
                        <td class="cssAlignCenter">[[${customerDto.customerNo}]]</td>
                        <td class="cssAlignCenter">[[${customerDto.customerId}]]</td>
                        <td class="cssAlignCenter">[[${customerDto.customerName}]]</td>
                        <td class="cssAlignCenter">[[${customerDto.email}]]</td>
                        <td class="cssAlignCenter">[[${customerDto.activated}]]</td>
                    </tr>
                </th:block>
                </tbody>
            </table>
        </div>
    </div>
</div>      <!-- div class="container-sm" -->

<div class="modal fade" id="roleModal" tabindex="-1" aria-labelledby="roleModalLabel" aria-hidden="true" style="display: none;">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="roleModalLabel">[권한]</h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <div class="modal-body">
                <h3 class="modal-title fs-3 validateTips">권한을 부여해 주세요.</h3>
                <table id="tblRole" class="table table-striped table-bordered" style="max-height: 150px; overflow-y: scroll;">
                    <thead>
                    <tr class="table-warning">
                        <th class="cssAlignCenter">권한명</th>
<!--                        <th class="cssAlignCenter" style="width: 50px">권한여부</th>-->
                    </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
                <!--추가 정보들-->
                <div id="email" class="hidden_info" value=""></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" id="btnCancel" data-bs-dismiss="modal">취소</button>
                <button type="button" class="btn btn-primary" id="btnUpdateRole">등록</button>
            </div>
        </div>
    </div>
</div>

</body>
</html>
