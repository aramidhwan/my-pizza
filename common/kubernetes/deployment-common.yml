apiVersion: apps/v1
kind: Deployment
metadata:
  name: dev-common
  namespace: dev-app
  labels:
    app: common
spec:
  replicas: 2
  selector:
    matchLabels:
      app: common
  template:
    metadata:
      labels:
        app: common
    spec:
      containers:
        - name: common
          image: mypizzaacr.azurecr.io/common:latest
          ports:
            - containerPort: 443
          env:
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: dev-app-secret
                  key: db_url
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: dev-app-secret
                  key: db_username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: dev-app-secret
                  key: db_password
            - name: KAFKA-BINDER-BROKERS
              valueFrom:
                configMapKeyRef:
                  name: dev-app-configmap
                  key: kafka_binder_brokers
            - name: FEIGN-URL-STORE-SERVICE
              valueFrom:
                configMapKeyRef:
                  name: dev-app-configmap
                  key: feign-url-store-service
---
apiVersion: v1
kind: Service
metadata:
  name: dev-common
  namespace: dev-app
  labels:
    app: common
spec:
  ports:
    - port: 443
      targetPort: 443
  selector:
    app: common
#  type: ClusterIP
#  type: LoadBalancer
---
apiVersion: v1
kind: Service
metadata:
  annotations:
  name: dev-common-headless-svc
  namespace: dev-ingress
spec:
  # {Service Name}.{Namespace}.svc.cluster.local 형식으로 작성
  externalName: dev-common.dev-app.svc.cluster.local
  selector:
    app: store
  type: ExternalName
