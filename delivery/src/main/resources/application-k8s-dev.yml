server:
  port: 80

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10 #최대 pool 크기
      minimum-idle: 10 #최소 pool 크기

  cloud:
    config:
      enabled: false
    stream:
      kafka:
        binder:
          brokers: ${KAFKA-BINDER-BROKERS}

eureka:
  client:
    enabled: false
