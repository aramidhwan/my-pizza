management:                 # Spring Actuator
  endpoint:
    gateway:
      enabled: true         # default: true
    env:
      show-values: ALWAYS   # /actuator/envм—җм„ң valueлҘј ліҙм—¬мӨ„м§Җ м—¬л¶Җ (ALWAYS/NEVER/WHEN_AUTHORIZED)
  endpoints:
    web:
      exposure:
        include: env    # м—”л“ңнҸ¬мқёнҠёк°Җ м–ҙл–Ө н•ӯлӘ©л“Өмқ„ мӮ¬мҡ©н•  кІғмқём§Җ м§Җм • (м—¬кё°м„ңлҠ” gateway)

logging:
  level:
    root: info
    com.study: debug
#    org.springframework.security: trace
    org.hibernate.orm.jdbc.bind: info
