spring:
  application:
    name: mypage
  jpa:
    open-in-view: false
    properties:
      hibernate:
        show_sql: false
        format_sql: true
        highlight_sql: true
        # dialect: org.hibernate.dialect.MySQL57Dialect
    hibernate:
      # create, create-drop, update, validate, none
      # create : SessionFactory мӢңмһ‘мӢң мҠӨнӮӨл§ҲлҘј мӮӯм ңн•ҳкі  лӢӨмӢң мғқм„ұ
      # create-drop : SessionFactory мў…лЈҢ мӢң мҠӨнӮӨл§ҲлҘј мӮӯм ң
      # update : ліҖкІҪлҗң мҠӨнӮӨл§Ҳ м Ғмҡ©(мҡҙмҳҒDBм—җм„ңлҠ” мӮ¬мҡ©н•ҳл©ҙ м•ҲлҗЁ), SessionFactory м—°кІ°лҗң DBмҷҖ л№„көҗн•ҳм—¬ м¶”к°Җлҗң н•ӯлӘ©(м»¬лҹј)мқҖ м¶”к°Җ л§Ңм•Ҫ к°ҷмқҖ ліҖмҲҳлӘ…мқҙл©ҙ мҳӨлҘҳл°ңмғқ
      #          update мҳөм…ҳм—җм„ң м»¬лҹј(ліҖмҲҳ) мӮӯм ңлҠ” м—„мІӯлӮң л¬ём ңлҘј л°ңмғқмӢңнӮ¬ мҲҳ мһҲкё° л•Ңл¬ём—җ м»¬лҹј м¶”к°Җл§Ң л°ҳмҳҒлҗңлӢӨ.
      # validate : м—”нӢ°нӢ° ліҖмҲҳл“Өкіј н…Ңмқҙлё” м»¬лҹјл“Өмқҙ м •мғҒ л§Өн•‘лҗҳм—ҲлҠ”м§Җл§Ң нҷ•мқё, SessionFactory мӢңмһ‘мӢң к°қмІҙкө¬м„ұкіј мҠӨнӮӨл§Ҳк°Җ лӢӨлҘҙлӢӨл©ҙ мҳҲмҷё л°ңмғқ
      # none: м•„л¬ҙкІғлҸ„ м•Ҳн•Ё
      # мҡҙмҳҒнҷҳкІҪм—җм„ңлҠ” м ҲлҢҖ create, create-drop, updateлҘј мӮ¬мҡ©н•ҳл©ҙ м•ҲлҗЁ
      #      ddl-auto: update
      ddl-auto: validate     # мӢӨм ң мҡҙмҳҒм—җм„ң м„ңл№„мҠӨ л°°нҸ¬мӢңлҠ” none or validateл§Ң мӮ¬мҡ©, generate-ddlлҸ„ falseлЎң мҡҙмҳҒ
#      ddl-auto: create        # кё°мЎҙ н…Ңмқҙлё” DROP нӣ„ мһ¬ мғқм„ұ, л°ҳл“ңмӢң лЎңм»¬нҷҳкІҪм—җм„ңл§Ң мӮ¬мҡ©(мҡҙмҳҒX)
      generate-ddl: true      # generate-ddl мқҖ мң„мқҳ ddl-auto мҶҚм„ұмқ„ мӮ¬мҡ©н• м§Җ л§җм§ҖлҘј кІ°м •н•ҳлҠ” мҳөм…ҳмқҙлӢӨ.(кё°ліёк°’ false)

  config:
    import: optional:configserver:http://admin:admin@localhost:6060 # http://м•„мқҙл””:л№„л°ҖлІҲнҳё@м•„мқҙн”ј:нҸ¬нҠё

  cloud:
    config:
      enabled: false
    function:
      definition: whenever_OrderedEvent_CreateModifyMyPage
    stream:
      bindings:
        whenever_OrderedEvent_CreateModifyMyPage-in-0:
          group: whenever_OrderedEvent_CreateModifyMyPage
          destination: myPizza-order
        myPageEvent-out-0:
          destination: myPizza-mypage

    openfeign:
      client:
        config:
          default:
            connectTimeout: 1000
            readTimeout: 2000
            loggerLevel: BASIC
          STORE:        # @FeignClient(name="STORE")м—җ н•ҙлӢ№н•ҳлҠ” л¶Җл¶„ кё°мҲ 
            readTimeout: 4000
            loggerLevel: BASIC
          ORDER:        # @FeignClient(name="ORDER")м—җ н•ҙлӢ№н•ҳлҠ” л¶Җл¶„ кё°мҲ 
            readTimeout: 4000
            loggerLevel: BASIC
      circuitbreaker:           # CircuitBreaker кё°лҠҘмқ„ On. (лі„лҸ„лЎң кө¬нҳ„мІҙмқё Resilience4 м„Өм • н•„мҡ”)
        #        enabled: true           # мқҙ к°’мқҙ trueмқҙл©ҙ @RetryлӮҳ @CircuitBreakerмқҳ fallbackмқҙ м•„лӢҢ @FeignClientмқҳ fallbackмқҙ мӢӨн–үлҗҳлІ„лҰ°лӢӨ.
        alphanumeric-ids:
          enabled: true

  cache:
    cache-names: "cache1,cache2"

  thymeleaf:
    prefix: classpath:/templates/   # Optional
    suffix: .html                   # Optional
    cache: false                    # Optional (default: true)

resilience4j:
  circuitbreaker:
    circuit-breaker-aspect-order: 1    # мҡ°м„ мҲңмң„ м„Өм •(мҲ«мһҗк°Җ лҶ’мқ„мҲҳлЎқ мҡ°м„ мҲңмң„к°Җ лҶ’лӢӨ.)
    configs:
      default:
        registerHealthIndicator: true   # For Actuator
        slidingWindowType: TIME_BASED   # COUNT_BASED(default), TIME_BASED
        slidingWindowSize: 30           # Configures the size of the sliding window which is used to record the outcome of calls when the CircuitBreaker is closed.
        failureRateThreshold: 50        # failure rate threshold in percentage.
        slowCallDurationThreshold: 2000 # нҳём¶ңмӢңк°„мқҙ м„Өм •к°’ліҙлӢӨ кёёл©ҙ лҠҗлҰ°нҳём¶ңлЎң нҢҗлӢЁ, Configures the duration(ms) threshold above which calls are considered as slow and increase the rate of slow calls.
        slowCallRateThreshold: 2        # лҠҗлҰ° нҳём¶ң л№„мңЁ(%)мқҙ м„Өм •к°’ ліҙлӢӨ нҒ¬кұ°лӮҳ к°ҷмңјл©ҙ м„ңнӮ· лёҢл Ҳмқҙм»Өк°Җ OPEN мғҒнғңлЎң м „нҷҳлҗҳкі  нҳём¶ң м°ЁлӢЁ
        waitDurationInOpenState: 30000   # The time(ms) that the CircuitBreaker should wait before transitioning from open to half-open.
        maxWaitDurationInHalfOpenState: 0
        minimumNumberOfCalls: 3
  #        ignoreExceptions:
  #          - com.ebay.seo.linking.service.exception.ESNotAvailableException
  #    instances:
  #      StoreGatewaygetStoreNmString:     # @FeignClientмқҙ лӢ¬лҰ° ClassлӘ…+MethodлӘ…+лҰ¬н„ҙTYPE, https://resilience4j.readme.io/docs/circuitbreaker --> Create and configure a CircuitBreaker
  #        minimumNumberOfCalls: 5
  timelimiter:                         # openfeign м—җм„ң мқҙлҜё readTimeOutмқ„ м„Өм •н•Ё
    configs:
      default:
        timeoutDuration: 2s             # кё°ліёк°’ : 1000 [ms]
    instances:
      StoreGatewaygetStoreNmString:
        timeoutDuration: 4s             # кё°ліёк°’ : 1000 [ms]
      OrderGatewaygetItemNmString:
        timeoutDuration: 4s             # кё°ліёк°’ : 1000 [ms]
  retry:
    retryAspectOrder: 2
    configs:
      default:
        maxAttempts: 1
        waitDuration: 100ms
#        enableExponentialBackoff: false
#        retryExceptions:
#          - java.util.concurrent.TimeoutException
#          - java.io.IOException

eureka:
  client:
    register-with-eureka: true 	#мң л Ҳм№ҙ м„ңлІ„м—җ л“ұлЎқн• м§Җ м—¬л¶Җ
    fetch-registry: true    #мң л Ҳм№ҙ м„ңлІ„мқҳ м •ліҙлҘј к°Җм ёмҳ¬м§Җ м—¬л¶Җ

