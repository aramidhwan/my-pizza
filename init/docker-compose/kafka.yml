#      - kafka-2
#      - kafka-3
#    environment:
#      ZK_HOSTS: "zookeeper-1:32181"
#      ZK_HOSTS: "zkForCmak:42181"

  ui-kafka:
    image: provectuslabs/kafka-ui
    container_name: ui-kafka
    ports:
      - "8989:8080"
    networks:
      - my-pizza
    depends_on:
      - zookeeper-1
      - kafka-1
      - kafka-2
      - kafka-3
    #    restart: always
    environment:
      - KAFKA_CLUSTERS_0_NAME="Local Docker Kafka"
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=INTERNAL://kafka-1:19092,INTERNAL://kafka-2:19093,INTERNAL://kafka-3:19094 # 참고로 kafka 브로커는 9092, 9093, 9094 임
      - KAFKA_CLUSTERS_0_ZOOKEEPER=zookeeper-1:22181  # 참고로 주키퍼 포트는 32181 임

networks:
  my-pizza:
    external: true