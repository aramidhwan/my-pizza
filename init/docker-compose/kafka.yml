#  docker-compose -f /home/shshin/workspace/intellij/my-pizza/docker-compose/kafka.yml up -d

version: '3.8'
services:
  zookeeper-1:
#    image: wurstmeister/zookeeper:latest
    image: confluentinc/cp-zookeeper:5.5.1
    container_name: zookeeper-1
#    volumes:
#      - "./zookeeper/data:/data"
#      - "./zookeeper/logs:/datalog"
    ports:
      - "32181:32181"
    networks:
      - my-pizza

    environment:
      ZOOKEEPER_SERVER_ID: 1          # 주키퍼를 식별하는 아이디로 유일한 값, 1개의 주키퍼를 사용할 예정이라 없어도 문제 없음
      ZOOKEEPER_CLIENT_PORT: 32181    # 주키퍼 포트, 기본 포트로 2181 사용
      ZOOKEEPER_TICK_TIME: 2000       # zk 클러스터를 구성할 때 동기화를 위한 기본 틱 타임, Ephemeral Node의 헬스 체크 간격, 주키퍼에서 시간 초과를 체크하는 tick 단위. 기본값은 2초
#      ZOOKEEPER_SERVERS: zookeeper-1:12888:13888;zookeeper-2:22888:23888;zookeeper-3:32888:33888

  kafka-1:
    image: wurstmeister/kafka:latest
    #    image: confluentinc/cp-kafka:5.5.1
    container_name: kafka-1
    ports:
      - '9092:9092'
      - '15050:5050'
    networks:
      - my-pizza
    depends_on:
      - zookeeper-1
    environment:
      KAFKA_BROKER_ID: 1                              # 카프카의 브로커 아이디로 유일한 값, 1개의 브로커를 사용할 예정이면 없어도 됨
      KAFKA_ZOOKEEPER_CONNECT: zookeeper-1:32181      # 주키퍼에 연결하기 위한 대상 지정 [서비스이름:컨테이너내부포트]
      JMX_PORT: 5050
      KAFKA_JMX_OPTS: -Dcom.sun.management.jmxremote -Dcom.sun.management.jmxremote.authenticate=false -Dcom.sun.management.jmxremote.ssl=false -Djava.rmi.server.hostname=kafka-1 -Dcom.sun.management.jmxremote.rmi.port=5050
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT # 보안을 위한 프로토콜 매핑이디. 이 설정값은 KAFKA_ADVERTISED_LISTENERS 과 함께 key/value로 매핑된다.
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_LISTENERS: INTERNAL://:19092, EXTERNAL://:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-1:19092,EXTERNAL://localhost:9092  # 외부 클라이언트에 알려주는 리스너 주소

  kafka-2:
    image: wurstmeister/kafka:latest
    #    image: confluentinc/cp-kafka:5.5.1
    container_name: kafka-2
    ports:
      - '9093:9093'
      - '25050:5050'
    networks:
      - my-pizza
    depends_on:
      - zookeeper-1
    environment:
      KAFKA_BROKER_ID: 2                              # 카프카의 브로커 아이디로 유일한 값, 1개의 브로커를 사용할 예정이면 없어도 됨
      KAFKA_ZOOKEEPER_CONNECT: zookeeper-1:32181      # 주키퍼에 연결하기 위한 대상 지정 [서비스이름:컨테이너내부포트]
      JMX_PORT: 5050
      KAFKA_JMX_OPTS: -Dcom.sun.management.jmxremote -Dcom.sun.management.jmxremote.authenticate=false -Dcom.sun.management.jmxremote.ssl=false -Djava.rmi.server.hostname=kafka-2 -Dcom.sun.management.jmxremote.rmi.port=5050
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT # 보안을 위한 프로토콜 매핑. PLAINTEXT는 암호화하지 않은 일반 평문
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_LISTENERS: INTERNAL://:19093, EXTERNAL://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-2:19093,EXTERNAL://localhost:9093  # 외부 클라이언트에 알려주는 리스너 주소

  kafka-3:
    image: wurstmeister/kafka:latest
    #    image: confluentinc/cp-kafka:5.5.1
    container_name: kafka-3
    ports:
      - '9094:9094'
      - '35050:5050'
    networks:
      - my-pizza
    depends_on:
      - zookeeper-1
    environment:
      KAFKA_BROKER_ID: 3                              # 카프카의 브로커 아이디로 유일한 값, 1개의 브로커를 사용할 예정이면 없어도 됨
      KAFKA_ZOOKEEPER_CONNECT: zookeeper-1:32181      # 주키퍼에 연결하기 위한 대상 지정 [서비스이름:컨테이너내부포트]
      JMX_PORT: 5050
      KAFKA_JMX_OPTS: -Dcom.sun.management.jmxremote -Dcom.sun.management.jmxremote.authenticate=false -Dcom.sun.management.jmxremote.ssl=false -Djava.rmi.server.hostname=kafka-3 -Dcom.sun.management.jmxremote.rmi.port=5050
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT # 보안을 위한 프로토콜 매핑. PLAINTEXT는 암호화하지 않은 일반 평문
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_LISTENERS: INTERNAL://:19094, EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka-3:19094,EXTERNAL://localhost:9094  # 외부 클라이언트에 알려주는 리스너 주소

