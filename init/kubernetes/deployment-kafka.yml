  annotations:
  name: dev-kafka-1-headless-svc
  namespace: dev-app
spec:
  type: ExternalName
  # {Service Name}.{Namespace}.svc.cluster.local 형식으로 작성
  externalName: dev-kafka-1-svc.dev-kafka.svc.cluster.local
  selector:
    app: kafka-1
