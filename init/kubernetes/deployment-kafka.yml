---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dev-kafka-1
  namespace: dev-kafka
  labels:
    app: kafka-1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-1
  template:
    metadata:
      labels:
        app: kafka-1
    spec:
      containers:
        - name: broker
          image: bitnami/kafka:3.5.1
          ports:
            - containerPort: 9092
          env:
            - name: TZ
              value: "Asia/Seoul"
            - name: KAFKA_BROKER_ID
              value: "1"
            - name: KAFKA_DELETE_TOPIC_ENABLE
              value: "true"
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: dev-zookeeper-service:2181
            - name: KAFKA_LISTENERS
              value: PLAINTEXT://0.0.0.0:9092
            - name: KAFKA_ADVERTISED_LISTENERS
              value: PLAINTEXT://dev-kafka-1-svc.dev-kafka.svc.cluster.local:9092
#            - name: KAFKA_DEFAULT_REPLICATION_FACTOR
#              value: "3"
#            - name: KAFKA_NUM_PARTITIONS
#              value: "2"                      # 토픽이 몇 개의 파티션으로 생성되는지. 기본 값

