---
apiVersion: v1
kind: Service
metadata:
  name: dev-kafka-1-svc
  namespace: dev-kafka
  labels:
    app: kafka-1
spec:
  selector:
    app: kafka-1
  ports:
    - protocol: TCP
      port: 9092
      targetPort: 9092
#  type: NodePort
#  type: LoadBalancer
#  type: ClusterIP
#  type: ExternalName
