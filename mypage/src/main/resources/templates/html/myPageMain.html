<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!--bootstrap 용 css-->
    <link rel="stylesheet" href="/mypage-service/css/bootstrap.min.css">
    <style>
        table th {
            white-space: nowrap;
            overflow: hidden;   // 만약 셀 크기가 너무 작아 글자가 잘린다면, overflow: hidden; 또는 text-overflow: ellipsis; 속성을 활용하면 좋습니다.
            text-overflow: ellipsis;
        }
        table td {
            white-space: nowrap;
            overflow: hidden;   // 만약 셀 크기가 너무 작아 글자가 잘린다면, overflow: hidden; 또는 text-overflow: ellipsis; 속성을 활용하면 좋습니다.
            text-overflow: ellipsis;
        }
        .cssAlignCenter {
            text-align: center;
            vertical-align: middle;
        }
        .custom-popover {
          --bs-popover-max-width: 200px;
          --bs-popover-border-color: var(--bd-violet-bg);
          --bs-popover-header-bg: var(--bd-violet-bg);
          --bs-popover-header-color: var(--bs-white);
          --bs-popover-body-padding-x: 1rem;
          --bs-popover-body-padding-y: .5rem;
        }
        div.colcss1 {
            padding-bottom: 3px;
            display: flex;
            justify-content: right;
        }
        img.css1 {
            object-fit: none;
        }
    </style>
</head>
<body>
<div class="container-sm">
    <div class="row">
        <div style="display: flex; align-items: center;">
            <!-- 왼쪽 h4 -->
            <h4 style="margin: 0; white-space: nowrap;">주문 내역을 확인해 보세요.</h4>
            <!-- 오른쪽 입력 그룹 -->
            <div style="display: flex; align-items: center; gap: 8px; margin-left: auto;">
                <label for="startDate" style="margin: 0;">기간 선택</label>
                <input id="startDate" class="form-control"
                       placeholder="시작일" style="width: 120px; flex: 0 0 auto;" />
                <span class="input-group-text" style="font-weight: bold;">~</span>
                <input id="endDate" class="form-control"
                       placeholder="종료일" style="width: 120px; flex: 0 0 auto;" />
                <button type="button" class="btn btn-primary" id="btnSearch" onclick="loadMyOrder('')">검색</button>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col">
            <hr>
        </div>
    </div>

    <div class="row">
        <div id="tableContainer" class="col">
        </div>
    </div>
</div>
<script src="/mypage-service/js/myPageMain.js" defer></script>
</body>
</html>
