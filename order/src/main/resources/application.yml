spring:
  application:
    name: order
  jpa:
    open-in-view: false
    properties:
      hibernate:
        show_sql: false
        format_sql: true
        # dialect: org.hibernate.dialect.MySQL57Dialect
    hibernate:
      # create, create-drop, update, validate, none
      # create : SessionFactory мӢңмһ‘мӢң мҠӨнӮӨл§ҲлҘј мӮӯм ңн•ҳкі  лӢӨмӢң мғқм„ұ
      # create-drop : SessionFactory мў…лЈҢ мӢң мҠӨнӮӨл§ҲлҘј мӮӯм ң
      # update : ліҖкІҪлҗң мҠӨнӮӨл§Ҳ м Ғмҡ©(мҡҙмҳҒDBм—җм„ңлҠ” мӮ¬мҡ©н•ҳл©ҙ м•ҲлҗЁ), SessionFactory м—°кІ°лҗң DBмҷҖ л№„көҗн•ҳм—¬ м¶”к°Җлҗң н•ӯлӘ©(м»¬лҹј)мқҖ м¶”к°Җ л§Ңм•Ҫ к°ҷмқҖ ліҖмҲҳлӘ…мқҙл©ҙ мҳӨлҘҳл°ңмғқ
      #          update мҳөм…ҳм—җм„ң м»¬лҹј(ліҖмҲҳ) мӮӯм ңлҠ” м—„мІӯлӮң л¬ём ңлҘј л°ңмғқмӢңнӮ¬ мҲҳ мһҲкё° л•Ңл¬ём—җ м»¬лҹј м¶”к°Җл§Ң л°ҳмҳҒлҗңлӢӨ.
      # validate : м—”нӢ°нӢ° ліҖмҲҳл“Өкіј н…Ңмқҙлё” м»¬лҹјл“Өмқҙ м •мғҒ л§Өн•‘лҗҳм—ҲлҠ”м§Җл§Ң нҷ•мқё, SessionFactory мӢңмһ‘мӢң к°қмІҙкө¬м„ұкіј мҠӨнӮӨл§Ҳк°Җ лӢӨлҘҙлӢӨл©ҙ мҳҲмҷё л°ңмғқ
      # none: м•„л¬ҙкІғлҸ„ м•Ҳн•Ё
      # мҡҙмҳҒнҷҳкІҪм—җм„ңлҠ” м ҲлҢҖ create, create-drop, updateлҘј мӮ¬мҡ©н•ҳл©ҙ м•ҲлҗЁ
      ddl-auto: validate     # мӢӨм ң мҡҙмҳҒм—җм„ң м„ңл№„мҠӨ л°°нҸ¬мӢңлҠ” none or validateл§Ң мӮ¬мҡ©, generate-ddlлҸ„ falseлЎң мҡҙмҳҒ
#      ddl-auto: create        # кё°мЎҙ н…Ңмқҙлё” DROP нӣ„ мһ¬ мғқм„ұ, л°ҳл“ңмӢң лЎңм»¬нҷҳкІҪм—җм„ңл§Ң мӮ¬мҡ©(мҡҙмҳҒX)
      generate-ddl: true      # generate-ddl мқҖ мң„мқҳ ddl-auto мҶҚм„ұмқ„ мӮ¬мҡ©н• м§Җ л§җм§ҖлҘј кІ°м •н•ҳлҠ” мҳөм…ҳмқҙлӢӨ.(кё°ліёк°’ false)

  config:
    import: optional:configserver:http://admin:admin@localhost:6060 # http://м•„мқҙл””:л№„л°ҖлІҲнҳё@м•„мқҙн”ј:нҸ¬нҠё

  cloud:
    config:
      enabled: false
    function:
      definition: >
        whenever_storeEvent_updateStatus; whenever_deliveryEvent_updateStatus
    stream:
      bindings:
        whenever_storeEvent_updateStatus-in-0:
          group: whenever_storeEvent_updateStatus
          destination: myPizza-store
#          мЈјмқҳ) kafka нҶ н”Ҫ partition мҲҳк°Җ (Pod мҲҳ * concurrency) ліҙлӢӨ л§Һм•„м•ј нҡЁкіјк°Җ мһҲмқҢ
#          мЈјмқҳ) kafka нҶ н”Ҫ partition мҲҳ вүҘ Pod мҲҳ Г— concurrency
#          н•ҙлӢ№ binding м•Ҳм—җм„ң Kafka consumer мҠӨл Ҳл“ң(consumer container)лҘј мөңлҢҖ 3к°ң мӢӨн–үн•ҳкІ лӢӨлҠ” мқҳлҜёмһ…лӢҲлӢӨ.
#          н…ҢмҠӨнҠё) 1. kafka нҶ н”Ҫмқҳ нҢҢнӢ°м…ҳ мҲҳ мҰқм„Ө 1-->2к°ң
#                 2. м•„лһҳ consumer.concurrencyлҘј 2к°ңлЎң м„Өм •
#                 3. л©”мӢңм§Җ producer мӘҪ(store)м—җм„ң produce мӢң kafka key(orderId) м§Җм •(н•ҙмӢң)
#                 4. kafka keyмқҳ н•ҙмӢңк°’м—җ л”°лқј 2к°ң consumer threadк°Җ лҸҷмӢң мҲҳн–үлҗЁ
#          Consumer thread 1 вҶ’ partition 0
#          Consumer thread 2 вҶ’ partition 1
#          Consumer thread 3 вҶ’ partition 2
#          consumer:
#            concurrency: 2
        whenever_deliveryEvent_updateStatus-in-0:
          group: whenever_deliveryEvent_updateStatus
          destination: myPizza-delivery
#          consumer:
#            concurrency: 3
        orderEvent-out-0:
          destination: myPizza-order

    openfeign:
      client:
        config:
          default:
            connectTimeout: 1000
            readTimeout: 2000
            loggerLevel: BASIC
          STORE:        # @FeignClient(name="STORE")м—җ н•ҙлӢ№н•ҳлҠ” л¶Җл¶„ кё°мҲ 
            readTimeout: 4000
            loggerLevel: BASIC
      circuitbreaker:           # CircuitBreaker кё°лҠҘмқ„ On. (лі„лҸ„лЎң кө¬нҳ„мІҙмқё Resilience4 м„Өм • н•„мҡ”)
#        enabled: true           # мқҙ к°’мқҙ trueмқҙл©ҙ @RetryлӮҳ @CircuitBreakerмқҳ fallbackмқҙ м•„лӢҢ @FeignClientмқҳ fallbackмқҙ мӢӨн–үлҗҳлІ„лҰ°лӢӨ.
        alphanumeric-ids:
          enabled: true

  thymeleaf:
    prefix: classpath:/templates/   # Optional
    suffix: .html                   # Optional
    cache: false                    # Optional (default: true)

resilience4j:
  circuitbreaker:
    circuit-breaker-aspect-order: 1    # мҡ°м„ мҲңмң„ м„Өм •(мҲ«мһҗк°Җ лҶ’мқ„мҲҳлЎқ мҡ°м„ мҲңмң„к°Җ лҶ’лӢӨ.)
    configs:
      default:
        registerHealthIndicator: true   # For Actuator
        slidingWindowType: TIME_BASED   # COUNT_BASED(default), TIME_BASED
        slidingWindowSize: 30           # Configures the size of the sliding window which is used to record the outcome of calls when the CircuitBreaker is closed.
        failureRateThreshold: 50        # failure rate threshold in percentage.
        slowCallDurationThreshold: 2000 # нҳём¶ңмӢңк°„мқҙ м„Өм •к°’ліҙлӢӨ кёёл©ҙ лҠҗлҰ°нҳём¶ңлЎң нҢҗлӢЁ, Configures the duration(ms) threshold above which calls are considered as slow and increase the rate of slow calls.
        slowCallRateThreshold: 2        # лҠҗлҰ° нҳём¶ң л№„мңЁ(%)мқҙ м„Өм •к°’ ліҙлӢӨ нҒ¬кұ°лӮҳ к°ҷмңјл©ҙ м„ңнӮ· лёҢл Ҳмқҙм»Өк°Җ OPEN мғҒнғңлЎң м „нҷҳлҗҳкі  нҳём¶ң м°ЁлӢЁ
        waitDurationInOpenState: 30000   # The time(ms) that the CircuitBreaker should wait before transitioning from open to half-open.
        maxWaitDurationInHalfOpenState: 0
        minimumNumberOfCalls: 3
#        ignoreExceptions:
#          - com.ebay.seo.linking.service.exception.ESNotAvailableException
#    instances:
#      StoreServicecheckOpenYnString:     # @FeignClientмқҙ лӢ¬лҰ° ClassлӘ…+MethodлӘ…+лҰ¬н„ҙTYPE, https://resilience4j.readme.io/docs/circuitbreaker --> Create and configure a CircuitBreaker
#        minimumNumberOfCalls: 5
  timelimiter:                         # openfeign м—җм„ң мқҙлҜё readTimeOutмқ„ м„Өм •н•Ё
    configs:
      default:
        timeoutDuration: 2s             # кё°ліёк°’ : 1000 [ms]
    instances:
      InternalGatewaycheckOpenYnString:
        timeoutDuration: 4s             # кё°ліёк°’ : 1000 [ms]
  retry:
    retryAspectOrder: 2
    configs:
      default:
        maxAttempts: 1
        waitDuration: 100ms
#        enableExponentialBackoff: false
#        retryExceptions:
#          - java.util.concurrent.TimeoutException
#          - java.io.IOException

eureka:
  client:
    register-with-eureka: true 	#мң л Ҳм№ҙ м„ңлІ„м—җ л“ұлЎқн• м§Җ м—¬л¶Җ
    fetch-registry: true    #мң л Ҳм№ҙ м„ңлІ„мқҳ м •ліҙлҘј к°Җм ёмҳ¬м§Җ м—¬л¶Җ

jwt:
  header: Authorization
  #HS512 м•Ңкі лҰ¬мҰҳмқ„ мӮ¬мҡ©н•  кІғмқҙкё° л•Ңл¬ём—җ 512bit, мҰү 64byte мқҙмғҒмқҳ secret keyлҘј мӮ¬мҡ©н•ҙм•ј н•ңлӢӨ.
  #echo 'silvernine-tech-spring-boot-jwt-tutorial-secret-silvernine-tech-spring-boot-jwt-tutorial-secret'|base64
  secret: c2lsdmVybmluZS10ZWNoLXNwcmluZy1ib290LWp3dC10dXRvcmlhbC1zZWNyZXQtc2lsdmVybmluZS10ZWNoLXNwcmluZy1ib290LWp3dC10dXRvcmlhbC1zZWNyZXQK

management:                 # Spring Actuator
  endpoint:
    gateway:
      enabled: true         # default: true
    env:
      show-values: ALWAYS   # /actuator/envм—җм„ң valueлҘј ліҙм—¬мӨ„м§Җ м—¬л¶Җ (ALWAYS/NEVER/WHEN_AUTHORIZED)
    circuitbreakerevents:
      enabled: true
    health:
      show-details: ALWAYS  # /actuator/health
  health:
    circuitbreakers:
      enabled: true
    timelimiter:
      enabled: true
    binders:
      enabled: false
    clientConfigServer:
      enabled: false
    diskspace:
      enabled: false
  metrics:
    enable:
      resilience4j:
        circuitbreaker:
          calls: true
  endpoints:
    web:
      exposure:
        include: refresh, health, metrics, logfile, env, loggers   #, env    # м—”л“ңнҸ¬мқёнҠёк°Җ м–ҙл–Ө н•ӯлӘ©л“Өмқ„ мӮ¬мҡ©н•  кІғмқём§Җ м§Җм • (м—¬кё°м„ңлҠ” gateway)

logging:
  file:
    name: order.log
#    path:
  logback:
    rollingpolicy:
      max-history: 2          # лЎңк·ё нҢҢмқјмқ„ мң м§Җн•  кё°к°„(мқјмҲҳ)мқ„ м„Өм •
      max-file-size: 100KB    # лЎңк·ё нҢҢмқјмқҳ н•ң к°ңмқҳ мөңлҢҖ мӮ¬мқҙмҰҲ м„Өм •
      file-name-pattern: order.%d{yyyy-MM-dd}-%i.log # лЎңк·ё нҢҢмқјмқҳ мӮ¬мқҙмҰҲк°Җ м„Өм •н•ң мҡ©лҹүмқ„ мҙҲкіјн•ҳкұ°лӮҳ лӮ м§ңк°Җ ліҖкІҪлҗ  кІҪмҡ° лӘ…лӘ…н•  лЎңк·ёнҢҢмқјмқҳ мқҙлҰ„м—җ лҢҖн•ң м„Өм •
  pattern:
    dateformat: Asia/Seoul

  level:
    root: info
    com.study: debug
#    com.study.mypizza.order.eventHandler: trace
#    org.springframework.security: trace
#    org.springframework.transaction: DEBUG
#    org.springframework.orm.jpa.JpaTransactionManager: DEBUG
#    org.hibernate.transaction: DEBUG
#    org.hibernate: info
    # Logs the JDBC parameters passed to a query
    # For Spring Boot 3, as it uses Hibernate 6, "logging.level.org.hibernate.type: trace" not working, Ues blow.
#    org.hibernate.SQL: debug
#    org.hibernate.orm.jdbc.bind: trace    org.springframework.cloud: info
    org.apache.kafka.common.utils.AppInfoParser: WARN
    org.apache.kafka.clients.Metadata: WARN
    org.apache.kafka.clients.admin.AdminClientConfig: WARN
    org.apache.kafka.clients.consumer.ConsumerConfig: WARN
    org.apache.kafka.clients.producer.ProducerConfig: WARN
    org.apache.kafka.clients.consumer.internals.ConsumerCoordinator: WARN
    org.apache.kafka.common.metrics.Metrics: WARN
    org.hibernate.hql.internal.QueryTranslatorFactoryInitiator: WARN

mypizza:
  cors:
    allowedOrigins: https://my-pizza.io